<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOHAM — Meet the Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:       #0E1A2E;
      --black-mid:   #162340;
      --black-soft:  #1E2F52;
      --gold:        #C9960A;
      --gold-light:  #E8B84B;
      --gold-glow:   rgba(201,150,10,0.18);
      --ivory:       #EEF4FF;
      --ivory-dim:   rgba(220,235,255,0.7);
      --ivory-faint: rgba(220,235,255,0.15);
      --white:       #FFFFFF;
      --blue-deep:   #1A3A6E;
      --blue-mid:    #2A5298;
      --blue-light:  #4A7EC4;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif; font-weight: 300;
      background: var(--black); color: var(--ivory); overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      padding: 0 2.5rem; height: 72px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(14,26,46,0.96); backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(201,150,10,0.2);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 1.8rem;
      text-decoration: none; height: 100%; overflow: hidden;
    }

    .nav-logo img {
      height: 130px; width: 130px; object-fit: contain;
      mix-blend-mode: screen; margin: -30px -10px -30px 0; flex-shrink: 0;
    }

    .nav-logo-text {
      font-family: 'Cinzel', serif; font-size: 0.78rem;
      color: var(--gold-light); letter-spacing: 0.12em; text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 2.2rem; list-style: none; }

    .nav-links a {
      font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(245,239,224,0.6);
      text-decoration: none; position: relative; transition: color 0.25s;
    }

    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 1px; background: var(--gold);
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--gold-light); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    .nav-hamburger {
      display: none; flex-direction: column; justify-content: space-between;
      width: 26px; height: 18px; background: none; border: none; cursor: pointer; z-index: 600;
    }
    .nav-hamburger span { display: block; width: 100%; height: 1.5px; background: var(--gold-light); transition: all 0.3s; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(8.25px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-8.25px) rotate(-45deg); }

    /* ── HERO ── */
    .page-hero {
      position: relative; min-height: 42vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 9rem 2rem 5rem;
      background: radial-gradient(ellipse at 50% 70%, #2A5298 0%, #1A3A6E 40%, #0E1A2E 75%);
      overflow: hidden;
    }

    #starfield-banner {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .page-hero-glow {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,150,10,0.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
    }

    .page-hero-content { position: relative; z-index: 2; }

    .page-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.45em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
      opacity: 0; animation: fadeUp 0.9s ease 0.2s forwards;
    }

    .page-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 300; font-style: italic;
      color: var(--white); line-height: 1.1;
      opacity: 0; animation: fadeUp 0.9s ease 0.4s forwards;
    }

    .page-title span { color: var(--gold-light); font-style: normal; font-weight: 600; }

    .page-tagline {
      font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(245,239,224,0.4); margin-top: 1rem;
      opacity: 0; animation: fadeUp 0.9s ease 0.6s forwards;
    }

    .hero-rule {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.5rem auto 0;
      opacity: 0; animation: fadeUp 0.9s ease 0.7s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TEAM GRID ── */
    .team-section { padding: 6rem 2rem 7rem; background: var(--black-mid); }
    .container { max-width: 1200px; margin: 0 auto; }

    .section-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.38em;
      text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 0.8rem;
    }

    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; font-style: italic;
      color: var(--ivory); line-height: 1.15; margin-bottom: 1rem;
    }

    .section-heading em { font-style: normal; color: var(--gold-light); }

    .gold-rule {
      width: 50px; height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      margin-bottom: 3rem;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5px;
      background: rgba(201,150,10,0.1);
      border: 1px solid rgba(201,150,10,0.1);
    }

    .team-card {
      background: var(--black-soft);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }

    .team-card::after {
      content: ''; position: absolute;
      bottom: 0; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      transform: scaleX(0); transition: transform 0.4s;
    }

    .team-card:hover { background: var(--black-mid); }
    .team-card:hover::after { transform: scaleX(1); }

    .team-photo-ring {
      width: 120px; height: 120px; border-radius: 50%;
      margin: 0 auto 1.3rem; position: relative;
    }

    .team-photo-ring::before {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 1px solid rgba(201,150,10,0.5);
      transition: border-color 0.3s;
    }

    .team-card:hover .team-photo-ring::before { border-color: var(--gold); }

    .team-photo-ring img {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; object-position: center top; display: block;
      background: var(--black-soft);
    }

    .team-photo-placeholder {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--black-soft);
      display: flex; align-items: center; justify-content: center;
    }

    .team-photo-placeholder svg { width: 40px; height: 40px; fill: rgba(201,150,10,0.3); }

    .team-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 400; color: var(--ivory); margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .team-role {
      font-family: 'Cinzel', serif; font-size: 0.52rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold);
    }

    /* reveal */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── BACK / FOOTER ── */
    .back-bar {
      background: var(--black); border-top: 1px solid rgba(201,150,10,0.12);
      padding: 1.2rem 2.5rem; text-align: center;
    }

    .back-bar a {
      font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold); text-decoration: none; transition: color 0.2s;
    }

    .back-bar a:hover { color: var(--gold-light); }

    footer {
      background: #080F1C; border-top: 1px solid rgba(201,150,10,0.12);
      padding: 3rem 2rem; text-align: center;
    }

    footer img {
      height: 130px; width: 130px; object-fit: contain;
      mix-blend-mode: screen; display: block; margin: 0 auto 1rem; opacity: 0.7;
    }

    footer p { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.18em; color: rgba(245,239,224,0.25); }
    footer span { color: var(--gold); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .nav-hamburger { display: flex; }
      .nav-logo img { height: 100px; width: 100px; margin: -15px -5px -15px 0; }
      .nav-logo { font-size: 0.68rem; gap: 1rem; flex: 1; min-width: 0; margin-right: 1rem; overflow: hidden; }
      .nav-logo-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: block; }
      .nav-links {
        display: none; flex-direction: column;
        position: absolute; top: 72px; left: 0; right: 0;
        background: rgba(14,26,46,0.98); backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(201,150,10,0.2); padding: 0.5rem 0; z-index: 400;
      }
      .nav-links.open { display: flex; }
      .nav-links a::after { display: none; }
      .nav-links li a { display: block; padding: 0.9rem 2.5rem; border-bottom: 1px solid rgba(201,150,10,0.06); letter-spacing: 0.18em; }
      .team-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
  <script src="config.js"></script>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="images/GohamLight.png" alt="GOHAM Logo">
      <span class="nav-logo-text" id="nav-logo-text"></span>
    </a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html#events" onclick="closeMenu()">Events</a></li>
      <li><a href="index.html#about" onclick="closeMenu()">About</a></li>
      <li><a href="index.html#mission" onclick="closeMenu()">Mission</a></li>
      <li><a href="index.html#give" onclick="closeMenu()">Give</a></li>
      <li><a href="programs.html" onclick="closeMenu()">Programs</a></li>
      <li><a href="team.html" class="active" onclick="closeMenu()">Meet the Team</a></li>
      <li><a href="index.html#find-us" onclick="closeMenu()">Find Us</a></li>
    </ul>
  </nav>

  <div class="page-hero">
    <canvas id="starfield-banner"></canvas>
    <div class="page-hero-glow"></div>
    <div class="page-hero-content">
      <p class="page-eyebrow">The People Behind the Ministry</p>
      <h1 class="page-title">Meet the <span>Team</span></h1>
      <p class="page-tagline">Servants of the Most High God</p>
      <div class="hero-rule"></div>
    </div>
  </div>

  <section class="team-section">
    <div class="container">
      <span class="section-eyebrow reveal">Our Family</span>
      <h2 class="section-heading reveal">The People <em>Behind the Ministry</em></h2>
      <div class="gold-rule reveal"></div>
      <div class="team-grid" id="team-grid"></div>
    </div>
  </section>

  <div class="back-bar">
    <a href="index.html">← Back to Home</a>
  </div>

  <footer>
    <img src="images/GohamLight.png" alt="GOHAM Logo">
    <p>© <span id="footer-year"></span> <span id="footer-church"></span>. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    const hamburger = document.getElementById('nav-hamburger');
    const navLinks  = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); navLinks.classList.toggle('open'); });
    function closeMenu() { hamburger.classList.remove('open'); navLinks.classList.remove('open'); }

    // Starfield
    (function() {
      const canvas = document.getElementById('starfield-banner');
      const ctx = canvas.getContext('2d');
      function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
      resize(); window.addEventListener('resize', resize);
      const stars = Array.from({ length: 110 }, () => ({
        x: Math.random() * 2 - 0.5, y: Math.random() * 2 - 0.5,
        r: Math.random() * 1.4 + 0.2,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.007 + 0.002,
        gold: Math.random() < 0.07
      }));
      let driftAngle = 0;
      function draw() {
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.rotate(driftAngle);
        ctx.translate(-W / 2, -H / 2);
        driftAngle += 0.000013;
        stars.forEach(s => {
          s.phase += s.speed;
          const a = 0.2 + Math.abs(Math.sin(s.phase)) * 0.8;
          ctx.beginPath();
          ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
          ctx.fillStyle = s.gold ? `rgba(232,184,75,${a*0.8})` : `rgba(255,255,255,${a})`;
          ctx.fill();
        });
        ctx.restore();
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // Team render
    const DEFAULT_TEAM_NAME = 'GOHAM Community Church';
    const DEFAULT_TEAM = [
      { name:"Bishop Simon K Christic",    role:"Bishop",                  photo:"images/pastor.jpg"  },
      { name:"Dr. Reverend Mercy Kolando", role:"Reverend",                photo:"images/team-2.jpg"  },
      { name:"Brother Boniface Chibwabwa", role:"Financial Minister",      photo:"images/team-16.jpg" },
      { name:"Brother Abel Kolando",       role:"Minister / Intercessor",  photo:"images/team-3.jpg"  },
      { name:"Elder Danny Lufundisha",     role:"Elder",                   photo:"images/team-4.jpg"  },
      { name:"Elder Edith Chipandwe",      role:"Women's Ministry",        photo:"images/team-5.jpg"  },
      { name:"Sister Keturah Zepeda",      role:"Women's Ministry",        photo:"images/team-6.jpg"  },
      { name:"Sister Miranda Chipandwe",   role:"Women's Ministry",        photo:"images/team-7.jpg"  },
      { name:"Sister Petronella Mutale",   role:"Women's Ministry",        photo:"images/team-8.jpg"  },
      { name:"Sister Sandra Batala",       role:"Youth Leader / Usher",    photo:"images/team-9.jpg"  },
      { name:"Sister Rebecca Phiri",       role:"Women's Ministry",        photo:"images/team-10.jpg" },
      { name:"Brother Abramham Mwape",     role:"Usher / Intercessor",     photo:"images/team-11.jpg" },
      { name:"Brother Daniel Gumbo",       role:"Media Team",              photo:"images/team-12.jpg" },
      { name:"Brother James Mutale",       role:"Media Team",              photo:"images/team-13.jpg" },
      { name:"Sister Annet Chanda",        role:"Media Team",              photo:"images/team-14.jpg" },
      { name:"Brother Gabriel Zepeda",     role:"Disciple",                photo:"images/team-15.jpg" }
    ];

    const observer = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.1 });

    function renderTeam(data) {
      const name = data.name || data.church && data.church.name || 'GOHAM Community Church';
      document.title = name + ' — Meet the Team';
      document.getElementById('nav-logo-text').textContent = name;
      document.getElementById('footer-church').textContent = name;

      const team = data.team || data; // support both full config and bare array
      document.getElementById('team-grid').innerHTML = team.map((m, i) => `
        <div class="team-card reveal" style="transition-delay:${(i % 4) * 0.08}s">
          <div class="team-photo-ring">
            <img src="${m.photo}" alt="${m.name}" onerror="this.parentElement.innerHTML='<div class=team-photo-placeholder><svg viewBox=\\'0 0 24 24\\'><path d=\\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\\'/></svg></div>'">
          </div>
          <div class="team-name">${m.name}</div>
          <div class="team-role">${m.role}</div>
        </div>`).join('');
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    if (typeof GOHAM_CONFIG !== 'undefined') {
      renderTeam(GOHAM_CONFIG);
    } else {
      fetch('config.json')
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(d => renderTeam(d))
        .catch(() => renderTeam({ name: DEFAULT_TEAM_NAME, team: DEFAULT_TEAM }));
    }

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
