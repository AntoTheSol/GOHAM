<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet the Team — GOHAM Community Church</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF6EF;
      --green-dark: #2D4A3E;
      --green-mid: #3D6456;
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --charcoal: #2C2C2C;
      --warm-gray: #8B8378;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--cream);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.4rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(45, 74, 62, 0.95);
      backdrop-filter: blur(8px);
    }

    .nav-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.03em;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    /* ── HAMBURGER ── */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 28px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 200;
    }

    .nav-hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .nav-hamburger.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

    /* ── PARALLAX HEADER ── */
    .team-parallax {
      background-image:
        linear-gradient(to bottom, rgba(45,74,62,0.72) 0%, rgba(20,40,32,0.85) 100%),
        url('images/banner-2.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: var(--green-dark);
      padding: 8rem 2rem 5rem;
      text-align: center;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.9rem, 4vw, 2.9rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 1.2rem;
    }

    .divider {
      width: 56px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto;
    }

    /* ── TEAM GRID ── */
    .team {
      background: var(--cream);
      padding: 5rem 2rem 6rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2rem;
    }

    .team-card {
      text-align: center;
      background: var(--white);
      border: 1px solid rgba(45,74,62,0.08);
      padding: 2rem 1.5rem 1.8rem;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .team-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.11);
    }

    .team-photo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 0 auto 1.2rem;
      background-color: var(--green-dark);
      border: 3px solid var(--gold);
      overflow: hidden;
    }

    .team-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .team-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.05rem;
      color: var(--green-dark);
      margin-bottom: 0.3rem;
    }

    .team-role {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── BACK LINK ── */
    .back-bar {
      background: var(--green-dark);
      padding: 1.2rem 2.5rem;
      text-align: center;
    }

    .back-bar a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .back-bar a:hover { color: var(--gold-light); }

    /* ── FOOTER ── */
    footer {
      background: #152820;
      padding: 2rem;
      text-align: center;
    }

    footer p {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    footer span { color: var(--gold); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .nav-hamburger { display: flex; }
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: rgba(30, 55, 45, 0.98);
        padding: 1rem 0;
        gap: 0;
        z-index: 150;
      }
      .nav-links.open { display: flex; }
      .nav-links li a {
        display: block;
        padding: 0.85rem 2.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 0.85rem;
      }
      .team-parallax { background-attachment: scroll; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">GOHAM Community Church</a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" onclick="closeMenu()">Home</a></li>
      <li><a href="index.html#events" onclick="closeMenu()">Events</a></li>
      <li><a href="index.html#about" onclick="closeMenu()">About</a></li>
      <li><a href="index.html#mission" onclick="closeMenu()">Mission</a></li>
      <li><a href="index.html#give" onclick="closeMenu()">Give</a></li>
      <li><a href="index.html#find-us" onclick="closeMenu()">Find Us</a></li>
    </ul>
  </nav>

  <!-- PARALLAX HEADER -->
  <div class="team-parallax">
    <p class="section-label">The People Behind the Ministry</p>
    <h1 class="section-title">Meet the Team</h1>
    <div class="divider"></div>
  </div>

  <!-- TEAM CARDS -->
  <section class="team">
    <div class="container">
      <div class="team-grid" id="team-grid"></div>
    </div>
  </section>

  <!-- BACK LINK -->
  <div class="back-bar">
    <a href="index.html">← Back to Home</a>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© <span id="footer-year"></span> <span>GOHAM Community Church</span>. All rights reserved.</p>
  </footer>

  <script>
    // Hamburger
    const hamburger = document.getElementById('nav-hamburger');
    const navLinks  = document.getElementById('nav-links');
    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('open');
      navLinks.classList.toggle('open');
    });
    function closeMenu() {
      hamburger.classList.remove('open');
      navLinks.classList.remove('open');
    }

    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Team data — edit here or keep in sync with config.json
    const DEFAULT_TEAM = [
      { name: "Bishop Simon K Christic",   role: "Bishop",                  photo: "images/pastor.jpg" },
      { name: "Reverend Mercy Kolando",    role: "Reverend",                photo: "images/team-2.jpg" },
      { name: "Brother Boniface Chibwabwa",role: "Financial Minister",      photo: "images/team-16.jpg" },
      { name: "Brother Abel Kolando",      role: "Minister / Intercessor",  photo: "images/team-3.jpg" },
      { name: "Elder Danny Lufundisha",    role: "Elder",                   photo: "images/team-4.jpg" },
      { name: "Elder Edith Chipandwe",     role: "Women's Ministry",        photo: "images/team-5.jpg" },
      { name: "Sister Keturah Zepeda",     role: "Women's Ministry",        photo: "images/team-6.jpg" },
      { name: "Sister Miranda Chipandwe",  role: "Women's Ministry",        photo: "images/team-7.jpg" },
      { name: "Sister Petronella Mutale",  role: "Women's Ministry",        photo: "images/team-8.jpg" },
      { name: "Sister Sandra Batala",      role: "Youth Leader / Usher",    photo: "images/team-9.jpg" },
      { name: "Sister Rebecca Phiri",      role: "Women's Ministry",        photo: "images/team-10.jpg" },
      { name: "Brother Abramham Mwape",    role: "Usher / Intercessor",     photo: "images/team-11.jpg" },
      { name: "Brother Daniel Gumbo",      role: "Media Team",              photo: "images/team-12.jpg" },
      { name: "Brother James Mutale",      role: "Media Team",              photo: "images/team-13.jpg" },
      { name: "Sister Annet Chanda",       role: "Media Team",              photo: "images/team-14.jpg" },
      { name: "Brother Gabriel Zepeda",    role: "Disciple",                photo: "images/team-15.jpg" }
    ];

    function renderTeam(team) {
      document.getElementById('team-grid').innerHTML = team.map(m => `
        <div class="team-card">
          <div class="team-photo">
            <img src="${m.photo}" alt="${m.name}" onerror="this.style.display='none'">
          </div>
          <div class="team-name">${m.name}</div>
          <div class="team-role">${m.role}</div>
        </div>`).join('');
    }

    // Load from config.json if available, else use DEFAULT_TEAM
    fetch('config.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => renderTeam(data.team))
      .catch(() => renderTeam(DEFAULT_TEAM));
  </script>
</body>
</html>
